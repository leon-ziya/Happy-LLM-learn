<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一章 NLP 基础概念 - 交互式可视化</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#070b14;--fg:#e8ecf4;--muted:#6b7a94;
  --primary:#f59e0b;--secondary:#06b6d4;--tertiary:#a78bfa;
  --card:#0f1724;--border:#1a2540;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;min-height:100vh}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:20px 24px 60px}
header{text-align:center;padding:32px 0 16px}
header h1{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);margin-top:8px;font-size:15px}
.ch-badge{display:inline-block;padding:4px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px;background:rgba(245,158,11,.12);color:var(--primary);border:1px solid rgba(245,158,11,.25)}
/* 模式切换 */
.mode-tabs{display:flex;justify-content:center;gap:8px;margin:20px 0 28px;flex-wrap:wrap}
.mode-btn{padding:10px 24px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit}
.mode-btn:hover{border-color:var(--primary);color:var(--fg)}
.mode-btn.active{background:var(--primary);color:#070b14;border-color:var(--primary)}
/* 通用 */
.section{display:none}
.section.active{display:block}
/* ====== 发展历程模式 ====== */
.timeline-nav{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;margin-bottom:24px;padding:0 8px}
.t-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .3s;padding:6px 3px}
.t-dot{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--border);background:var(--card);transition:all .4s;position:relative;z-index:2}
.t-node.active .t-dot{border-color:var(--primary);background:var(--primary);box-shadow:0 0 16px rgba(245,158,11,.5);transform:scale(1.3)}
.t-node.done .t-dot{border-color:var(--primary);background:rgba(245,158,11,.25)}
.t-label{font-size:10px;color:var(--muted);margin-top:5px;white-space:nowrap;transition:color .3s;font-weight:700;text-align:center;max-width:72px}
.t-node.active .t-label{color:var(--primary)}
.t-conn{width:18px;height:2.5px;background:var(--border);transition:background .4s;flex-shrink:0;margin-bottom:16px}
.t-conn.done{background:var(--primary)}
.viz-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;min-height:400px}
@media(max-width:860px){.viz-wrap{grid-template-columns:1fr}}
.viz-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden}
.viz-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:.6}
.viz-box.left::before{background:linear-gradient(90deg,var(--primary),transparent)}
.viz-box.right::before{background:linear-gradient(90deg,var(--secondary),transparent)}
.viz-title{font-size:13px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
.viz-title.pri{color:var(--primary)}
.viz-title.sec{color:var(--secondary)}
/* 时间线图 */
.era-timeline{position:relative;padding:10px 0}
.era-line{position:absolute;left:16px;top:10px;bottom:10px;width:3px;background:var(--border);border-radius:2px}
.era-line-fill{position:absolute;left:16px;top:10px;width:3px;background:var(--primary);border-radius:2px;transition:height .5s}
.era-item{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start;position:relative;padding-left:10px}
.era-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--card);flex-shrink:0;margin-top:3px;transition:all .3s;z-index:1}
.era-item.active .era-dot{border-color:var(--primary);background:var(--primary);box-shadow:0 0 10px rgba(245,158,11,.4)}
.era-item.past .era-dot{border-color:var(--primary);background:rgba(245,158,11,.3)}
.era-content{flex:1}
.era-year{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:700}
.era-name{font-size:14px;font-weight:900;margin-top:2px;transition:color .3s}
.era-item.active .era-name{color:var(--primary)}
.era-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6}
/* 数据可视化 */
.data-viz{min-height:300px;display:flex;flex-direction:column;gap:12px}
/* Token 盒子 */
.token-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.token-box{padding:8px 16px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;text-align:center;animation:tokenIn .5s ease both}
@keyframes tokenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.token-box.pri{background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.3);color:var(--primary)}
.token-box.sec{background:rgba(6,182,212,.1);border:1.5px solid rgba(6,182,212,.3);color:var(--secondary)}
.token-box.ter{background:rgba(167,139,250,.1);border:1.5px solid rgba(167,139,250,.3);color:var(--tertiary)}
.token-box.muted{background:rgba(107,122,148,.1);border:1.5px solid rgba(107,122,148,.25);color:var(--muted)}
.token-box.ok{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);color:#10b981}
.token-box.err{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1);color:#ef4444}
.arrow-down{text-align:center;color:var(--primary);font-size:18px;margin:4px 0;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
/* 向量条 */
.vec-row{display:flex;align-items:center;gap:6px;margin:3px 0}
.vec-label{font-size:10px;color:var(--muted);width:50px;text-align:right;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.vec-bars{display:flex;gap:2px;flex:1}
.vec-bar{height:20px;border-radius:3px;transition:all .4s;animation:barGrow .6s ease both}
@keyframes barGrow{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
/* 对比面板 */
.compare-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.compare-panel{grid-template-columns:1fr}}
.compare-box{padding:14px;border-radius:10px;border:1.5px solid var(--border);background:rgba(0,0,0,.2)}
.compare-box h4{font-size:12px;margin-bottom:8px;font-weight:700}
.compare-box.good{border-color:rgba(16,185,129,.3)}
.compare-box.good h4{color:#10b981}
.compare-box.bad{border-color:rgba(239,68,68,.3)}
.compare-box.bad h4{color:#ef4444}
/* N-gram 演示 */
.ngram-demo{background:rgba(0,0,0,.25);border-radius:10px;padding:14px;border:1px solid var(--border)}
.ngram-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;font-family:'JetBrains Mono',monospace}
.ngram-word{padding:4px 10px;border-radius:6px;font-weight:700}
.ngram-arrow{color:var(--muted);font-size:14px}
.ngram-prob{color:var(--secondary);font-weight:700}
/* 步骤说明 */
.step-explain{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:20px}
.step-explain h3{font-size:17px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.step-explain h3 .step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--primary);color:#070b14;font-size:13px;font-weight:900;flex-shrink:0}
.step-explain p{color:var(--muted);line-height:1.8;font-size:14px}
.hl-p{color:var(--primary);font-weight:700}
.hl-s{color:var(--secondary);font-weight:700}
.hl-t{color:var(--tertiary);font-weight:700}
.step-nav{display:flex;justify-content:center;gap:16px;margin-bottom:28px}
.step-btn{padding:11px 28px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--fg);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;gap:8px}
.step-btn:hover{border-color:var(--primary);background:rgba(245,158,11,.08)}
.step-btn:disabled{opacity:.3;cursor:not-allowed}
.step-btn.primary{background:var(--primary);color:#070b14;border-color:var(--primary)}
.step-btn.primary:hover{box-shadow:0 0 20px rgba(245,158,11,.3);transform:translateY(-1px)}
/* ====== 知识图鉴模式 ====== */
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.task-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden}
.task-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.task-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .3s}
.task-card:hover::after{opacity:1}
.task-card.pri-card::after{background:linear-gradient(90deg,var(--primary),transparent)}
.task-card.sec-card::after{background:linear-gradient(90deg,var(--secondary),transparent)}
.task-card.ter-card::after{background:linear-gradient(90deg,var(--tertiary),transparent)}
.task-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.pri-card .task-icon{background:rgba(245,158,11,.12);color:var(--primary)}
.sec-card .task-icon{background:rgba(6,182,212,.12);color:var(--secondary)}
.ter-card .task-icon{background:rgba(167,139,250,.12);color:var(--tertiary)}
.task-card h4{font-size:15px;font-weight:900;margin-bottom:5px}
.task-card .task-brief{font-size:12px;color:var(--muted);line-height:1.6}
.task-tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-top:8px}
.tag-basic{background:rgba(245,158,11,.1);color:var(--primary)}
.tag-core{background:rgba(6,182,212,.1);color:var(--secondary)}
.tag-advanced{background:rgba(167,139,250,.1);color:var(--tertiary)}
/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(7,11,20,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:20px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:30px;position:relative;animation:modalIn .35s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:var(--primary);color:var(--fg)}
.modal h2{font-size:22px;font-weight:900;margin-bottom:4px}
.modal .modal-tag{display:inline-block;padding:3px 12px;border-radius:999px;font-size:11px;font-weight:700;margin-bottom:14px}
.detail-section{margin-bottom:18px}
.detail-section h3{font-size:14px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.detail-section h3.pri{color:var(--primary)}
.detail-section h3.sec{color:var(--secondary)}
.detail-section h3.ter{color:var(--tertiary)}
.detail-section p{font-size:13px;color:var(--muted);line-height:1.9}
.detail-section code{background:rgba(245,158,11,.08);color:var(--primary);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px}
.mini-viz{background:rgba(0,0,0,.25);border-radius:12px;padding:16px;margin:10px 0;border:1px solid var(--border)}
/* 分词演示 */
.seg-demo{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px}
.seg-word{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;animation:tokenIn .4s ease both}
/* 实体标注 */
.entity-demo{font-size:14px;line-height:2.2;padding:8px}
.entity{padding:2px 8px;border-radius:6px;font-weight:700;position:relative;cursor:default}
.entity.per{background:rgba(245,158,11,.12);border-bottom:2px solid var(--primary);color:var(--primary)}
.entity.loc{background:rgba(6,182,212,.12);border-bottom:2px solid var(--secondary);color:var(--secondary)}
.entity.org{background:rgba(167,139,250,.12);border-bottom:2px solid var(--tertiary);color:var(--tertiary)}
.entity.date{background:rgba(16,185,129,.12);border-bottom:2px solid #10b981;color:#10b981}
.entity-label{font-size:10px;position:absolute;top:-14px;left:50%;transform:translateX(-50%);white-space:nowrap;font-weight:700}
/* 关系图 */
.relation-demo{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;flex-wrap:wrap}
.rel-node{padding:8px 16px;border-radius:10px;font-weight:700;font-size:13px}
.rel-node.e1{background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.3);color:var(--primary)}
.rel-node.e2{background:rgba(6,182,212,.12);border:1.5px solid rgba(6,182,212,.3);color:var(--secondary)}
.rel-edge{padding:4px 14px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(167,139,250,.12);color:var(--tertiary);border:1px solid rgba(167,139,250,.25)}
/* 摘要对比 */
.summary-box{padding:12px;border-radius:10px;font-size:12px;line-height:1.8;color:var(--muted)}
.summary-box.extract{border:1px solid rgba(16,185,129,.25);background:rgba(16,185,129,.04)}
.summary-box.abstract{border:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.04)}
.summary-box .hl{font-weight:700}
.summary-box.extract .hl{color:#10b981}
.summary-box.abstract .hl{color:var(--primary)}
.summary-label{font-size:11px;font-weight:700;margin-bottom:6px}
.summary-box.extract .summary-label{color:#10b981}
.summary-box.abstract .summary-label{color:var(--primary)}
/* Word2Vec 示意 */
.w2v-space{position:relative;width:100%;height:200px;background:rgba(0,0,0,.2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.w2v-point{position:absolute;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);transition:all .3s}
.w2v-point::after{content:attr(data-label);position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap;color:var(--fg)}
.w2v-point.pri{background:var(--primary);box-shadow:0 0 8px rgba(245,158,11,.4)}
.w2v-point.sec{background:var(--secondary);box-shadow:0 0 8px rgba(6,182,212,.4)}
.w2v-point.ter{background:var(--tertiary);box-shadow:0 0 8px rgba(167,139,250,.4)}
/* 流程步骤 */
.flow-steps{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0}
.flow-step{padding:7px 20px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;background:var(--card);border:1.5px solid var(--border);max-width:280px;width:100%;animation:fadeSlideIn .4s ease both}
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.flow-arrow{color:var(--primary);font-size:12px}
/* POS 标注 */
.pos-demo{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px}
.pos-word{display:flex;flex-direction:column;align-items:center;gap:3px}
.pos-text{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pos-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
/* QA 类型 */
.qa-types{display:flex;flex-direction:column;gap:10px;padding:8px}
.qa-type{padding:10px 14px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.qa-type-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.qa-type:nth-child(1) .qa-type-icon{background:rgba(245,158,11,.12);color:var(--primary)}
.qa-type:nth-child(2) .qa-type-icon{background:rgba(6,182,212,.12);color:var(--secondary)}
.qa-type:nth-child(3) .qa-type-icon{background:rgba(167,139,250,.12);color:var(--tertiary)}
.qa-type-name{font-size:13px;font-weight:900}
.qa-type-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="app">
  <header>
    <div class="ch-badge">第一章</div>
    <h1>NLP 基础概念</h1>
    <p>从发展历程到核心任务，从文本表示到词向量演进，交互式理解 NLP 全貌</p>
  </header>
  <div class="mode-tabs">
    <button class="mode-btn active" data-mode="timeline"><i class="fas fa-stream"></i>&ensp;发展历程</button>
    <button class="mode-btn" data-mode="tasks"><i class="fas fa-th-large"></i>&ensp;知识图鉴</button>
  </div>

  <!-- 发展历程 -->
  <section id="timelineSection" class="section active">
    <div class="timeline-nav" id="timelineNav"></div>
    <div class="viz-wrap">
      <div class="viz-box left">
        <div class="viz-title pri"><i class="fas fa-clock"></i>&ensp;NLP 发展脉络</div>
        <div id="timelineView"></div>
      </div>
      <div class="viz-box right">
        <div class="viz-title sec"><i class="fas fa-eye"></i>&ensp;可视化演示</div>
        <div class="data-viz" id="dataViz"></div>
      </div>
    </div>
    <div class="step-explain" id="stepExplain"></div>
    <div class="step-nav">
      <button class="step-btn" id="prevBtn" disabled><i class="fas fa-chevron-left"></i> 上一步</button>
      <button class="step-btn primary" id="nextBtn">下一步 <i class="fas fa-chevron-right"></i></button>
    </div>
  </section>

  <!-- 知识图鉴 -->
  <section id="tasksSection" class="section">
    <div class="task-grid" id="taskGrid"></div>
  </section>
</div>

<div class="modal-overlay" id="taskModal">
  <div class="modal" id="taskModalContent"></div>
</div>

<script>
/* ========== 背景 ========== */
(function(){
  const c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  let w,h,particles=[];
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight;init()}
  function init(){
    particles=[];
    const n=Math.min(Math.floor(w*h/14000),100);
    for(let i=0;i<n;i++) particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.5+.5,a:Math.random()*.25+.08})
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    const g=ctx.createRadialGradient(w*.3,h*.4,0,w*.5,h*.5,w*.6);
    g.addColorStop(0,'rgba(245,158,11,0.025)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    const g2=ctx.createRadialGradient(w*.7,h*.6,0,w*.5,h*.5,w*.5);
    g2.addColorStop(0,'rgba(6,182,212,0.018)');g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(0,0,w,h);
    for(const p of particles){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,158,11,${p.a})`;ctx.fill();
    }
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(245,158,11,${.05*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}
      }
    }
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

    {year:'2000s+',name:'深度学习时代',desc:'RNN→LSTM→Attention→Transformer',step:3}
  ];
  const reps=[
    {year:'1975',name:'VSM 词向量',desc:'高维稀疏 One-Hot 表示',step:4},
    {year:'~2000',name:'N-gram 语言模型',desc:'基于马尔可夫假设的统计模型',step:5},
    {year:'2013',name:'Word2Vec',desc:'低维稠密词嵌入，语义相似度',step:6},
    {year:'2018',name:'ELMo',desc:'动态词向量，预训练思想诞生',step:7}
  ];
  const all=[...eras,...reps];
  const maxActive=curStep;
  const activeIdx=all.findIndex(a=>a.step===curStep);
  let fillH=0;
  let html='<div class="era-timeline"><div class="era-line"></div><div class="era-line-fill" style="height:0%"></div>';
  all.forEach((item,i)=>{
    const isPast=i<activeIdx;
    const isAct=i===activeIdx;
    const show=isPast||isAct;
    if(isPast) fillH=((i+1)/all.length)*100;
    html+=`<div class="era-item ${isAct?'active':isPast?'past':''}" style="opacity:${show?1:.3}">
      <div class="era-dot"></div>
      <div class="era-content">
        <div class="era-year">${item.year}</div>
        <div class="era-name">${item.name}</div>
        ${isAct?`<div class="era-desc">${item.desc}</div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  v.innerHTML=html;
  requestAnimationFrame(()=>{
    const fill=v.querySelector('.era-line-fill');

/* 向量行 (VSM) */
function buildVecRows(labels,vocabSize,sparse){
  let html='';
  labels.forEach((lb,i)=>{
    html+=`<div class="vec-row"><div class="vec-label">${lb}</div><div class="vec-bars">`;
    if(sparse){
      /* One-Hot: 大部分为0, 只有一个1 */
      const totalBars=16;
      const onePos=Math.floor(Math.random()*totalBars);
      for(let j=0;j<totalBars;j++){
        const isOne=j===onePos;
        html+=`<div class="vec-bar" style="width:${isOne?90:2}%;background:${isOne?'var(--primary)':'rgba(107,122,148,.2)'};opacity:${isOne?1:.3};animation-delay:${(i*16+j)*.02}s"></div>`;
      }
    } else {
      for(let j=0;j<8;j++){
        const w=Math.random()*60+20;
        html+=`<div class="vec-bar" style="width:${w}%;background:var(--secondary);opacity:${.3+Math.random()*.5};animation-delay:${(i*8+j)*.04}s"></div>`;
      }
    }
    html+=`</div></div>`;
  });
  return html;
}

    {title:'符号主义与统计方法 (1970s-1990s)',text:`研究者分裂为两大阵营：<span class="hl-p">符号主义</span>关注形式语言和生成语法，手写规则；<span class="hl-s">统计方法</span>关注概率和统计。1980s 随着计算力提升，统计模型开始取代复杂的手写规则，NLP 出现革命性变化。这一转变奠定了现代 NLP "数据驱动"的基础思想。`},
    {title:'深度学习时代 (2000s 至今)',text:`深度学习带来了 NLP 的飞跃：<span class="hl-p">RNN</span> → <span class="hl-s">LSTM</span> → <span class="hl-p">Word2Vec</span>(2013) → <span class="hl-t">Attention</span> → <span class="hl-s">Transformer</span>(2017) → <span class="hl-p">BERT/GPT</span>(2018+)。从 RNN 的序列建模到 Transformer 的并行注意力，模型能力不断突破，最终催生了当今的大语言模型。`},
    {title:'词向量 — VSM / One-Hot',text:`向量空间模型 (VSM) 将文本转换为高维向量。One-Hot 编码下，词汇表大小为 16384 时，每个词只有 1 个位置为 1，其余 16379 位全为 0，<span class="hl-p">稀疏率高达 99.97%</span>。主要问题：数据稀疏性、维数灾难、忽略词序和上下文、无法表达词间语义关系。`},
    {title:'N-gram 语言模型',text:`N-gram 基于<span class="hl-s">马尔可夫假设</span>：一个词的出现概率仅依赖于前 N-1 个词。Unigram(N=1) 仅考虑单个词概率，Bigram(N=2) 考虑前一个词，Trigram(N=3) 考虑前两个词。<span class="hl-p">优点</span>：简单有效；<span class="hl-p">缺点</span>：N 较大时数据稀疏严重，且无法捕捉长距离依赖和复杂语义。`},
    {title:'Word2Vec 词嵌入',text:`2013 年由 Mikolov 等人提出，核心思想是利用<span class="hl-p">上下文信息</span>捕捉词间语义关系，使语义相似的词在向量空间中距离更近。两种架构：<span class="hl-s">CBOW</span>（上下文→目标词）和 <span class="hl-t">Skip-Gram</span>（目标词→上下文）。相比 One-Hot，Word2Vec 生成<span class="hl-p">低维稠密向量</span>（几百维），能计算语义关系（如 国王-男人+女人≈王后），但仍是<span class="hl-p">静态词向量</span>，无法处理一词多义。`},
    {title:'ELMo 动态词向量',text:`ELMo 实现了从<span class="hl-p">静态词向量到动态词向量</span>的跨越，首次引入<span class="hl-s">预训练思想</span>。采用两阶段：1) 在大语料上用<span class="hl-t">双向 LSTM</span>预训练语言模型；2) 提取上下文相关的词向量补充到下游任务。关键突破：<span class="hl-p">一词多义</span>——同一个"苹果"在"吃苹果"和"苹果手机"中向量不同。局限：LSTM 训练慢，仅特征拼接非深度融合。`}
  ];
  const exp=exps[curStep];
  e.innerHTML=`<h3><span class="step-num">${curStep}</span>${exp.title}</h3><p>${exp.text}</p>`;
}

function render(){
  buildNav();buildTimeline();buildDataViz();buildExplain();
  document.getElementById('prevBtn').disabled=curStep===0;
  document.getElementById('nextBtn').disabled=curStep===STEPS.length-1;
  document.getElementById('nextBtn').innerHTML=curStep===STEPS.length-1?'已完成':'下一步 <i class="fas fa-chevron-right"></i>';
}

document.getElementById('prevBtn').addEventListener('click',()=>{if(curStep>0){curStep--;render()}});
document.getElementById('nextBtn').addEventListener('click',()=>{if(curStep<STEPS.length-1){curStep++;render()}});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&curStep<STEPS.length-1){curStep++;render()}
  if(e.key==='ArrowLeft'&&curStep>0){curStep--;render()}
});
render();

const TASKS=[

    detail:{def:'中文分词 (CWS) 是 NLP 的基础任务。由于中文没有空格分隔词边界，需要先将文本切分为词汇序列。分词不准确会直接影响后续所有任务。',example:'<div class="seg-demo"><span class="seg-word" style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;animation-delay:.1s">雍和宫</span><span class="seg-word" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--secondary);animation-delay:.2s">的</span><span class="seg-word" style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;animation-delay:.3s">荷花</span><span class="seg-word" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--secondary);animation-delay:.4s">开</span><span class="seg-word" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--secondary);animation-delay:.5s">的</span><span class="seg-word" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--secondary);animation-delay:.6s">很</span><span class="seg-word" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--secondary);animation-delay:.7s">好</span></div>',analogy:'分词就像把一串没有空格的珠子按意义切割成组。切错了，"雍和宫"变成"雍+和宫"，后面的工序就全乱了。'}},
  {id:'subword',name:'子词切分',type:'pri',icon:'fa-puzzle-piece',brief:'将词汇分解为更小的子词单位，解决词汇稀疏问题',tag:'基础任务',tagCls:'tag-basic',
    detail:{def:'子词切分 (Subword Segmentation) 将词分解为更小单位（如前缀、词根、后缀），处理罕见词和新词。常见方法：BPE、WordPiece、Unigram、SentencePiece。',example:'<div style="text-align:center;padding:12px"><div style="font-size:14px;font-weight:900;margin-bottom:10px;color:var(--fg)">unhappiness</div><div style="font-size:12px;color:var(--muted);margin-bottom:6px">↓ 子词切分 (BPE)</div><div class="token-row"><span class="token-box pri" style="animation-delay:.2s">un</span><span class="token-box sec" style="animation-delay:.3s">happi</span><span class="token-box ter" style="animation-delay:.4s">ness</span></div><div style="margin-top:10px;font-size:11px;color:var(--muted)"><span style="color:var(--primary)">un</span> = 否定前缀 &ensp;<span style="color:var(--secondary)">happi</span> = happy词根 &ensp;<span style="color:var(--tertiary)">ness</span> = 名词后缀</div></div>',analogy:'子词切分就像把一个不认识的汉字拆成偏旁部首——即使没见过"犇"，看到三个"牛"也能猜到跟牛有关。'}},
  {id:'pos',name:'词性标注',type:'pri',icon:'fa-tags',brief:'为每个单词分配词性标签，如名词、动词、形容词',tag:'基础任务',tagCls:'tag-basic',
    detail:{def:'词性标注 (POS Tagging) 为文本中每个单词分配词性标签（名词、动词、形容词等），是句法分析和语义理解的基础。常用模型：HMM、CRF、RNN/LSTM。',example:'<div class="pos-demo"><div class="pos-word"><span class="pos-text">She</span><span class="pos-tag" style="background:rgba(245,158,11,.12);color:var(--primary)">PRP 代词</span></div><div class="pos-word"><span class="pos-text">is</span><span class="pos-tag" style="background:rgba(6,182,212,.12);color:var(--secondary)">VBZ 动词</span></div><div class="pos-word"><span class="pos-text">playing</span><span class="pos-tag" style="background:rgba(6,182,212,.12);color:var(--secondary)">VBG 动词</span></div><div class="pos-word"><span class="pos-text">the</span><span class="pos-tag" style="background:rgba(167,139,250,.12);color:var(--tertiary)">DT 限定词</span></div><div class="pos-word"><span class="pos-text">guitar</span><span class="pos-tag" style="background:rgba(245,158,11,.12);color:var(--primary)">NN 名词</span></div></div>',analogy:'词性标注就像给每个词贴上"身份标签"，告诉计算机"她是代词、是动词、guitar是名词"，帮助理解句子结构。'}},
  {id:'cls',name:'文本分类',type:'sec',icon:'fa-folder-open',brief:'将文本自动分配到预定义类别中',tag:'核心任务',tagCls:'tag-core',
    detail:{def:'文本分类 (Text Classification) 将给定文本分配到一个或多个预定义类别。广泛应用于情感分析、垃圾邮件检测、新闻分类、主题识别等。',example:'<div style="display:flex;flex-direction:column;gap:8px;padding:8px"><div style="padding:10px 14px;border-radius:10px;border:1px solid rgba(245,158,11,.2);display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">"NBA季后赛湖人对决勇士"</span><span style="font-size:11px;font-weight:700;color:var(--primary);background:rgba(245,158,11,.12);padding:3px 10px;border-radius:999px">体育</span></div><div style="padding:10px 14px;border-radius:10px;border:1px solid rgba(6,182,212,.2);display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">"美国宣布提高关税"</span><span style="font-size:11px;font-weight:700;color:var(--secondary);background:rgba(6,182,212,.12);padding:3px 10px;border-radius:999px">政治</span></div><div style="padding:10px 14px;border-radius:10px;border:1px solid rgba(167,139,250,.2);display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--muted)">"苹果发布新款Macbook"</span><span style="font-size:11px;font-weight:700;color:var(--tertiary);background:rgba(167,139,250,.12);padding:3px 10px;border-radius:999px">科技</span></div></div>',analogy:'文本分类就像邮局分信——根据内容把信件投到不同的信箱里。'}},

    detail:{def:'命名实体识别 (NER) 自动识别文本中具有特定意义的实体，并分类为人名、地名、组织、日期等。是信息提取、知识图谱构建的基础。',example:'<div class="entity-demo"><span class="entity per" data-label="人名">李雷</span>和<span class="entity per" data-label="人名">韩梅梅</span>是<span class="entity loc" data-label="地名">北京市海淀区</span>的居民，他们计划在<span class="entity date" data-label="日期">2024年4月7日</span>去<span class="entity loc" data-label="地名">上海</span>旅行。</div>',analogy:'实体识别就像用荧光笔在文章中划重点——人名用橙色，地名用蓝色，日期用绿色，一眼就能看到关键信息。'}},

    detail:{def:'关系抽取 (Relation Extraction) 从文本中识别实体之间的语义关系（因果、拥有、亲属等），对知识图谱构建和问答系统至关重要。',example:'<div class="relation-demo"><div class="rel-node e1">比尔·盖茨</div><div class="rel-edge">创始人</div><div class="rel-node e2">微软公司</div></div><div style="text-align:center;margin-top:8px;font-size:11px;color:var(--muted)">从"比尔·盖茨是微软公司的创始人"中抽取三元组关系</div>',analogy:'关系抽取就像画连线题——把"比尔·盖茨"和"微软公司"用"创始人"这条线连起来。'}},
  {id:'summ',name:'文本摘要',type:'ter',icon:'fa-compress-alt',brief:'生成简洁准确的摘要概括原文主要内容',tag:'高级任务',tagCls:'tag-advanced',

function buildTaskGrid(){
  const grid=document.getElementById('taskGrid');grid.innerHTML='';
  TASKS.forEach((t,i)=>{
    const card=document.createElement('div');
    card.className=`task-card ${t.type}-card`;
    card.innerHTML=`<div class="task-icon"><i class="fas ${t.icon}"></i></div><h4>${t.name}</h4><div class="task-brief">${t.brief}</div><span class="task-tag ${t.tagCls}">${t.tag}</span>`;
    card.addEventListener('click',()=>openTaskModal(i));
    grid.appendChild(card);
  });
}

function openTaskModal(idx){
  const t=TASKS[idx];
  const modal=document.getElementById('taskModal');
  const content=document.getElementById('taskModalContent');
  const tagColors={pri:'background:rgba(245,158,11,.12);color:var(--primary)',sec:'background:rgba(6,182,212,.12);color:var(--secondary)',ter:'background:rgba(167,139,250,.12);color:var(--tertiary)'};
  content.innerHTML=`
    <button class="modal-close" aria-label="关闭"><i class="fas fa-times"></i></button>
    <h2>${t.name}</h2>
    <span class="modal-tag" style="${tagColors[t.type]}">${t.tag}</span>
    <div class="detail-section"><h3 class="pri"><i class="fas fa-info-circle"></i> 定义</h3><p>${t.detail.def}</p></div>
    <div class="detail-section"><h3 class="sec"><i class="fas fa-play-circle"></i> 交互演示</h3><div class="mini-viz">${t.detail.example}</div></div>
    <div class="detail-section"><h3 class="ter"><i class="fas fa-lightbulb"></i> 通俗理解</h3><p>${t.detail.analogy}</p></div>
  `;
  modal.classList.add('open');
  content.querySelector('.modal-close').addEventListener('click',()=>modal.classList.remove('open'));
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
}

buildTaskGrid();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('taskModal').classList.remove('open');
});
</script>
