<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>第三章 · 预训练语言模型 — 交互可视化</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
/* ========== 全局变量 ========== */
:root {
  --bg: #070b14;
  --fg: #e8ecf4;
  --muted: #6b7a94;
  --primary: #00e5a0;      /* Encoder-Only / NLU  — 青绿 */
  --secondary: #f59e0b;    /* Decoder-Only / NLG  — 琥珀 */
  --tertiary: #38bdf8;     /* Encoder-Decoder     — 亮青 */
  --card: #0f1724;
  --border: #1a2540;
  --card-soft: #131c2e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 粒子 Canvas 背景 */
#particle-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ========== 容器 ========== */
.container {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ========== 顶部标题区 ========== */
.hero {
  text-align: center;
  padding: 28px 0 24px;
  position: relative;
}
.hero .chapter-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--primary);
  padding: 6px 14px;
  border: 1px solid var(--primary);
  border-radius: 999px;
  margin-bottom: 18px;
  background: rgba(0, 229, 160, 0.06);
}
.hero h1 {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, var(--primary), var(--tertiary) 50%, var(--secondary));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.hero p.subtitle {
  color: var(--muted);
  font-size: 15px;
  max-width: 720px;
  margin: 0 auto;
}

/* ========== 模式切换按钮 ========== */
.mode-switch {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 28px 0 36px;
  flex-wrap: wrap;
}
.mode-btn {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 22px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.mode-btn i { font-size: 13px; }
.mode-btn:hover {
  color: var(--fg);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.mode-btn.active {
  color: var(--bg);
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 18px rgba(0, 229, 160, 0.35);
}

/* ========== 模式容器 ========== */
.mode-panel { display: none; animation: fade-in 0.4s ease; }
.mode-panel.active { display: block; }
@keyframes fade-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 模式一：流程演示 ========== */
/* 管道导航 */
.pipeline-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 auto 30px;
  max-width: 1100px;
  position: relative;
  padding: 0 12px;
}
.pipeline-line {
  position: absolute;
  top: 16px;
  left: 36px;
  right: 36px;
  height: 2px;
  background: var(--border);
  z-index: 0;
}
.pipeline-line .progress {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--tertiary), var(--secondary));
  width: 0%;
  transition: width 0.5s ease;
  border-radius: 2px;
}
.pipeline-node {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex: 1;
}
.pipeline-node .dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  transition: all 0.3s ease;
}
.pipeline-node .label {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  white-space: nowrap;
  transition: color 0.3s ease;
}
.pipeline-node:hover .dot {
  border-color: var(--primary);
  color: var(--fg);
}
.pipeline-node.active .dot {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--bg);
  transform: scale(1.25);
  box-shadow: 0 0 22px rgba(0, 229, 160, 0.55);
}
.pipeline-node.active .label { color: var(--primary); font-weight: 700; }
.pipeline-node.done .dot {
  background: rgba(0, 229, 160, 0.25);
  border-color: var(--primary);
  color: var(--primary);
}

/* 双栏面板 */
.dual-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  margin-bottom: 28px;
}
@media (max-width: 900px) {
  .dual-panel { grid-template-columns: 1fr; }
}
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  min-height: 380px;
}
.panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 18px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.panel-title i { color: var(--primary); }

/* 左侧：架构全景图 */
.arch-diagram {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 8px 0;
}
.arch-block {
  width: 100%;
  max-width: 320px;
  padding: 14px 18px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--card-soft);
  text-align: center;
  transition: all 0.35s ease;
  position: relative;
}
.arch-block .b-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 4px;
}
.arch-block .b-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.arch-block.role-primary { border-color: rgba(0, 229, 160, 0.35); }
.arch-block.role-secondary { border-color: rgba(245, 158, 11, 0.35); }
.arch-block.role-tertiary { border-color: rgba(56, 189, 248, 0.35); }
.arch-block.active {
  transform: scale(1.04);
  box-shadow: 0 0 28px rgba(0, 229, 160, 0.25);
}
.arch-block.active.role-primary { border-color: var(--primary); background: rgba(0, 229, 160, 0.08); }
.arch-block.active.role-secondary { border-color: var(--secondary); background: rgba(245, 158, 11, 0.08); box-shadow: 0 0 28px rgba(245, 158, 11, 0.25); }
.arch-block.active.role-tertiary { border-color: var(--tertiary); background: rgba(56, 189, 248, 0.08); box-shadow: 0 0 28px rgba(56, 189, 248, 0.25); }

.arch-arrow {
  color: var(--muted);
  font-size: 18px;
  animation: pulse-arrow 1.5s ease infinite;
}
@keyframes pulse-arrow {
  0%, 100% { opacity: 0.5; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(2px); }
}

.arch-row {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  justify-content: center;
}
.arch-row .arch-block { flex: 1; max-width: none; padding: 10px 8px; }
.arch-row .arch-block .b-label { font-size: 11px; }

/* 右侧：数据变换可视化 */
.viz-area {
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
}
.viz-caption {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* Token 盒子 */
.token-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.token-box {
  padding: 8px 12px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--fg);
  background: rgba(0, 229, 160, 0.12);
  border: 1px solid rgba(0, 229, 160, 0.3);
  opacity: 0;
  transform: translateY(12px);
  animation: token-in 0.5s ease forwards;
}
.token-box.masked {
  background: rgba(245, 158, 11, 0.15);
  border-color: var(--secondary);
  color: var(--secondary);
}
.token-box.special {
  background: rgba(56, 189, 248, 0.15);
  border-color: var(--tertiary);
  color: var(--tertiary);
}
.token-box.id {
  background: rgba(107, 122, 148, 0.15);
  border-color: var(--muted);
  color: var(--muted);
  font-size: 11px;
}
@keyframes token-in {
  to { opacity: 1; transform: translateY(0); }
}

/* 向量条 */
.vector-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 140px;
  justify-content: center;
  padding: 0 10px;
}
.v-bar {
  width: 18px;
  background: linear-gradient(180deg, var(--primary), rgba(0, 229, 160, 0.3));
  border-radius: 4px 4px 0 0;
  transform: scaleX(0);
  transform-origin: bottom;
  animation: bar-in 0.6s ease forwards;
  position: relative;
}
.v-bar .v-val {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
}
@keyframes bar-in {
  to { transform: scaleX(1); }
}

/* 注意力热力图 */
.attn-grid {
  display: grid;
  gap: 3px;
  justify-content: center;
  margin: 8px auto;
}
.attn-cell {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--fg);
  cursor: pointer;
  transition: transform 0.2s ease;
  position: relative;
}
.attn-cell:hover { transform: scale(1.15); z-index: 5; }
.attn-cell .tip {
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 10;
}
.attn-cell:hover .tip { opacity: 1; }

/* 掩码网格 */
.mask-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  max-width: 320px;
  margin: 0 auto;
}
.mask-cell {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  opacity: 0;
  animation: token-in 0.4s ease forwards;
}
.mask-cell.visible { background: rgba(0, 229, 160, 0.18); color: var(--primary); border: 1px solid rgba(0, 229, 160, 0.4); }
.mask-cell.masked { background: rgba(245, 158, 11, 0.18); color: var(--secondary); border: 1px solid rgba(245, 158, 11, 0.4); }
.mask-cell.future { background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

/* 流程步骤方块 */
.flow-steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.flow-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  opacity: 0;
  transform: translateX(-12px);
  animation: flow-in 0.5s ease forwards;
}
@keyframes flow-in {
  to { opacity: 1; transform: translateX(0); }
}
.flow-step .step-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(0, 229, 160, 0.15);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.flow-step .step-text {
  font-size: 13px;
  color: var(--fg);
}
.flow-step .step-text small { color: var(--muted); font-size: 11px; display: block; }

/* 对比卡片 */
.compare-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.compare-card {
  padding: 12px;
  border-radius: 10px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  text-align: center;
}
.compare-card.c-primary { border-color: rgba(0, 229, 160, 0.35); }
.compare-card.c-secondary { border-color: rgba(245, 158, 11, 0.35); }
.compare-card.c-tertiary { border-color: rgba(56, 189, 248, 0.35); }
.compare-card .c-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.compare-card.c-primary .c-title { color: var(--primary); }
.compare-card.c-secondary .c-title { color: var(--secondary); }
.compare-card.c-tertiary .c-title { color: var(--tertiary); }
.compare-card .c-text { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* 残差连接图 */
.residual-diagram {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  position: relative;
  padding: 10px;
}
.res-block {
  width: 80%;
  max-width: 240px;
  padding: 10px;
  border-radius: 8px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  text-align: center;
  font-size: 12px;
  font-weight: 700;
}
.res-arrow-bypass {
  position: relative;
  width: 100%;
  height: 30px;
}
.res-arrow-bypass::before {
  content: '';
  position: absolute;
  left: 12%;
  top: 0;
  width: 76%;
  height: 100%;
  border: 2px dashed var(--secondary);
  border-bottom: none;
  border-radius: 12px 12px 0 0;
}
.res-arrow-bypass::after {
  content: '残差';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--secondary);
  background: var(--card);
  padding: 2px 6px;
  border-radius: 4px;
}

/* 步骤说明区 */
.step-detail {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
}
.step-detail::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--primary), var(--tertiary));
}
.step-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.step-num {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}
.step-titles h2 {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 2px;
}
.step-titles .step-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1.5px;
}
.step-body {
  font-size: 15px;
  line-height: 1.8;
  color: #c7d0e0;
}
.step-body p { margin-bottom: 12px; }
.highlight-text { font-weight: 700; padding: 0 3px; border-radius: 3px; }
.highlight-text.p { color: var(--primary); background: rgba(0, 229, 160, 0.1); }
.highlight-text.s { color: var(--secondary); background: rgba(245, 158, 11, 0.1); }
.highlight-text.t { color: var(--tertiary); background: rgba(56, 189, 248, 0.1); }
.step-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: rgba(0, 229, 160, 0.08);
  color: var(--primary);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid rgba(0, 229, 160, 0.2);
}
.step-body .stat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}
.stat-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 12px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg);
}
.stat-chip strong { color: var(--primary); }

/* 导航按钮 */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  gap: 14px;
}
.nav-btn {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  font-weight: 700;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 12px 22px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--primary);
  background: rgba(0, 229, 160, 0.08);
  transform: translateY(-2px);
}
.nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.nav-btn.next { color: var(--primary); }

/* ========== 模式二：组件详解 ========== */
.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.model-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.model-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.model-card:hover {
  transform: translateY(-3px);
  border-color: var(--primary);
  box-shadow: 0 8px 24px rgba(0, 229, 160, 0.12);
}
.model-card:hover::before { opacity: 1; }
.model-card.c-secondary:hover { border-color: var(--secondary); box-shadow: 0 8px 24px rgba(245, 158, 11, 0.12); }
.model-card.c-secondary::before { background: linear-gradient(90deg, transparent, var(--secondary), transparent); }
.model-card.c-tertiary:hover { border-color: var(--tertiary); box-shadow: 0 8px 24px rgba(56, 189, 248, 0.12); }
.model-card.c-tertiary::before { background: linear-gradient(90deg, transparent, var(--tertiary), transparent); }

.model-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 14px;
}
.model-icon.p { background: rgba(0, 229, 160, 0.12); color: var(--primary); }
.model-icon.s { background: rgba(245, 158, 11, 0.12); color: var(--secondary); }
.model-icon.t { background: rgba(56, 189, 248, 0.12); color: var(--tertiary); }

.model-card h3 {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 4px;
}
.model-card .model-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.model-card .model-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
}
.model-card .model-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}
.model-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  color: var(--muted);
}
.model-tag.p { color: var(--primary); border-color: rgba(0, 229, 160, 0.3); }
.model-tag.s { color: var(--secondary); border-color: rgba(245, 158, 11, 0.3); }
.model-tag.t { color: var(--tertiary); border-color: rgba(56, 189, 248, 0.3); }

/* 弹窗 */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7, 11, 20, 0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;

/* ========== 当前状态 ========== */
let currentStep = 0;
let currentMode = 'flow';

/* ========== 渲染管道导航 ========== */
function renderPipeline() {
  const nav = document.getElementById('pipeline-nav');
  const line = nav.querySelector('.pipeline-line');
  // 清空除 line 外的节点
  Array.from(nav.children).forEach(c => { if (!c.classList.contains('pipeline-line')) c.remove(); });

  STEPS.forEach((s, i) => {
    const node = document.createElement('div');
    node.className = 'pipeline-node';
    if (i === currentStep) node.classList.add('active');
    else if (i < currentStep) node.classList.add('done');
    node.innerHTML = `
      <div class="dot">${i}</div>
      <div class="label">${s.label}</div>
    `;
    node.addEventListener('click', () => { currentStep = i; renderAll(); });
    nav.appendChild(node);
  });

  // 进度条
  const progress = document.getElementById('pipeline-progress');
  const pct = STEPS.length > 1 ? (currentStep / (STEPS.length - 1)) * 100 : 0;
  progress.style.width = pct + '%';
}

/* ========== 渲染架构图 ========== */
function renderArch() {
  const wrap = document.getElementById('arch-diagram');
  wrap.innerHTML = '';
  const step = STEPS[currentStep];
  step.arch.forEach((b, i) => {
    const block = document.createElement('div');
    block.className = `arch-block role-${b.role} active`;
    block.style.animationDelay = (i * 0.1) + 's';
    block.innerHTML = `
      <div class="b-label">${b.label}</div>
      <div class="b-sub">${b.sub}</div>
    `;
    wrap.appendChild(block);
    if (i < step.arch.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'arch-arrow';
      arrow.innerHTML = '<i class="fa-solid fa-arrow-down"></i>';
      wrap.appendChild(arrow);
    }
  });
}

/* 渲染小型掩码网格（用于架构对比） */
function renderMiniMask(type) {
  const n = 4;
  let html = '<div style="display:grid;grid-template-columns:repeat(' + n + ',1fr);gap:2px;max-width:90px;margin:0 auto">';
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      let visible;
      if (type === 'full') visible = true;
      else if (type === 'causal') visible = j <= i;
      else if (type === 'mixed') visible = (i + j) % 3 !== 0; // 简化示意
      const bg = visible ? 'rgba(0,229,160,0.45)' : 'rgba(107,122,148,0.15)';
      html += `<div style="aspect-ratio:1;border-radius:2px;background:${bg}"></div>`;
    }
  }
  html += '</div>';
  return html;
}

  const grid = document.getElementById('model-grid');

/* ========== 事件绑定 ========== */
// 模式切换
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.mode;

    document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
  });

// 上一步/下一步
document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; renderAll(); }
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentStep < STEPS.length - 1) { currentStep++; renderAll(); }
});

// 键盘左右
document.addEventListener('keydown', (e) => {
  if (currentMode !== 'flow') return;
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowLeft' && currentStep > 0) { currentStep--; renderAll(); }
  if (e.key === 'ArrowRight' && currentStep < STEPS.length - 1) { currentStep++; renderAll(); }
});

// 弹窗关闭
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') closeModal();
});

/* ========== 粒子网络动画背景 ========== */
(function () {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouse = { x: null, y: null };
  const PARTICLE_COUNT = 70;
  const MAX_DIST = 140;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 颜色数组（主色系）
  const colors = [
    { r: 0, g: 229, b: 160 },     // primary
    { r: 56, g: 189, b: 248 },    // tertiary
    { r: 245, g: 158, b: 11 }     // secondary
  ];

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.8 + 0.6,
        c: c
      });
    }
  }
  initParticles();
  window.addEventListener('resize', initParticles);

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 更新粒子位置
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });

    // 画连线
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MAX_DIST) {
          const alpha = (1 - dist / MAX_DIST) * 0.18;
          const c = particles[i].c;
          ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // 鼠标连线
    if (mouse.x !== null) {
      particles.forEach(p => {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 160) {
          const alpha = (1 - dist / 160) * 0.35;
          ctx.strokeStyle = `rgba(${p.c.r},${p.c.g},${p.c.b},${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.stroke();
        }
      });
    }

    // 画粒子
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.3, p.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.c.r},${p.c.g},${p.c.b},0.7)`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ========== 初始化 ========== */
renderAll();
renderModelGrid();
</script>
